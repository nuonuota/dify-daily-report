name: 每日舆情报告

on:
  schedule:
    - cron: '30 9 * * *'
  workflow_dispatch:

jobs:
  run-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: 调用 Dify 工作流
        run: |
          curl -X POST "${{ secrets.DIFY_BASE_URL }}/workflows/run" \
            -H "Authorization: Bearer ${{ secrets.DIFY_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "inputs": {},
              "response_mode": "blocking",
              "user": "daily-report-bot"
            }'
