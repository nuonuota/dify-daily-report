name: 每日舆情报告

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  run-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: 调用 Dify 工作流
        id: dify
        run: |
          RESPONSE=$(curl -s -X POST "${{ secrets.DIFY_BASE_URL }}/workflows/run" \
            -H "Authorization: Bearer ${{ secrets.DIFY_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "inputs": {},
              "response_mode": "blocking",
              "user": "daily-report-bot"
            }')
          
          echo "完整响应: $RESPONSE"
          
          # 提取 report 字段（你的输出在 data.outputs.report）
          REPORT=$(echo "$RESPONSE" | jq -r '.data.outputs.report // .data.outputs.text // "未找到报告内容"')
          
          # 保存到 GITHUB_OUTPUT
          echo "report_content<<EOF" >> $GITHUB_OUTPUT
          echo "$REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          # 同时保存完整响应用于调试
          echo "$RESPONSE" > response.json
      
      - name: 发送邮件报告
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: 36氪舆情日报 - $(date '+%Y-%m-%d')
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_USER }}
          body: |
            ${{ steps.dify.outputs.report_content }}
            
            ---
            本邮件由自动定时任务发送
          secure: true
